name: crmx_mobile
description: Mobile-first Flutter UI for CRMX call, WhatsApp, client, follow-up, and insight workflows.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # HTTP & API
  http: ^1.2.2
  
  # Supabase
  supabase_flutter: ^2.3.4
  
  # State Management
  flutter_riverpod: ^2.5.1
  
  # Secure Storage
  flutter_secure_storage: ^9.0.0
  
  # Utils
  intl: ^0.19.0
  
  # Environment Variables
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  # Environment variables file
  assets:
    - .env
